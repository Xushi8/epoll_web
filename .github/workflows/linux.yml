name: Build, Upload, and Download Artifacts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cxx: [g++-14, clang++-19]
        build_type: [Debug, Release]
        sanitizer: [address, others]
        include:
          - cxx: g++-14
            install: |
              sudo apt install g++-14 mold ninja-build libmimalloc-dev libboost1.83-dev libbenchmark-dev libgtest-dev libre2-dev
          - cxx: clang++-19
            install: |
              echo 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main' | sudo tee -a /etc/apt/sources.list.d/llvm.list
              wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
              sudo apt update
              sudo apt install clang-19 libomp-19-dev libc++-19-dev mold ninja-build libmimalloc-dev libboost1.83-dev libbenchmark-dev libgtest-dev libre2-dev

    steps:
    - uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        sudo apt update
        ${{ matrix.install }}

    - name: Build project
      run: |
        mkdir -p build
        tar -czf build/my_artifact.tar.gz my_project_folder/

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: my-artifact
        path: build/my_artifact.tar.gz

  download:
    runs-on: ubuntu-24.04
    needs: build  # Ensure the build job completes before downloading
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: my-artifact
        path: ./downloaded  # Path to store the downloaded artifact

    - name: Extract the downloaded artifact
      run: |
        tar -xvzf ./downloaded/my_artifact.tar.gz -C ./downloaded
